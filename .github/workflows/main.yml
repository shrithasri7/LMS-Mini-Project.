
name: LMS Mini Project CI Workflow

on:
  push:
    branches:
      - main
      - feature-update

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout LMS Project Repository
        uses: actions/checkout@v3

      - name: Display Project Information
        run: echo "Running CI Workflow for Library Management System Mini Project"

      - name: List Project Files
        run: ls

      - name: Verify index.html file
        run: |
          if [ -f index.html ]; then
            echo "index.html file exists in the LMS project"
          else
            echo "index.html file not found"
          fi

      - name: CI Workflow Completed
        run: echo "LMS Mini Project CI pipeline executed successfully"
